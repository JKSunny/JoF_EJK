name: build

permissions:
  contents: write

on:
  # Beta: build on push
  push:
    branches:
      - beta
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "docs/**"

  # Master: manual + nightly
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # midnight UTC

jobs:
  # =========================
  # BETA
  # =========================
  beta-version:
    if: github.ref == 'refs/heads/beta' && github.event_name == 'push'
    name: Compute Beta Version
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.version.outputs.tag_version }}
      base_version: ${{ steps.version.outputs.base_version }}
      version_suffix: ${{ steps.version.outputs.version_suffix }}
    steps:
      - name: Checkout beta branch
        uses: actions/checkout@v4
        with:
          ref: beta
          fetch-depth: 0
          fetch-tags: true

      - name: Compute beta version
        id: version
        shell: bash
        run: |
          # Find the latest non-beta release tag (e.g. 1.6.0)
          LAST_RELEASE=$(git tag --list | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          if [ -z "$LAST_RELEASE" ]; then LAST_RELEASE="0.0.0"; fi
          echo "Base release: $LAST_RELEASE"

          # Find the highest existing beta number and increment
          LAST_BETA=$(git tag --list "${LAST_RELEASE}-beta.*" | sed "s/${LAST_RELEASE}-beta\.//" | sort -n | tail -1)
          if [ -z "$LAST_BETA" ]; then LAST_BETA=0; fi
          BETA_NUM=$((LAST_BETA + 1))

          TAG_VERSION="${LAST_RELEASE}-beta.${BETA_NUM}"
          VERSION_SUFFIX=" beta ${BETA_NUM}"

          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "base_version=$LAST_RELEASE" >> $GITHUB_OUTPUT
          echo "version_suffix=$VERSION_SUFFIX" >> $GITHUB_OUTPUT
          echo "Computed version: $TAG_VERSION (base: $LAST_RELEASE, suffix: $VERSION_SUFFIX)"

  windows:
    if: github.ref == 'refs/heads/beta' && github.event_name == 'push'
    name: Windows ${{ matrix.arch }} Release (Beta)
    needs: beta-version
    runs-on: windows-2022
    strategy:
      matrix:
        include:
          - arch: x86
            platform: Win32
          - arch: x86_64
            platform: x64
    steps:
      - name: Checkout beta branch
        uses: actions/checkout@v4
        with:
          ref: beta
          fetch-depth: 0
          fetch-tags: true

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Download Sunny's Vulkan DLL
        shell: bash
        run: |
          mkdir -p external
          if [ "${{ matrix.arch }}" = "x86" ]; then
            ZIP_NAME=EternalJK-windows-x86.zip
            DLL_NAME=rd-vulkan_x86.dll
          else
            ZIP_NAME=EternalJK-windows-x86_64.zip
            DLL_NAME=rd-vulkan_x86_64.dll
          fi
          curl -L -o external/$ZIP_NAME \
            https://github.com/JKSunny/EternalJK/releases/download/latest/$ZIP_NAME
          unzip -j external/$ZIP_NAME "$DLL_NAME" -d external
          echo "RD_VULKAN_DLL=${{ github.workspace }}/external/$DLL_NAME" >> $GITHUB_ENV

      - name: Create build directory
        run: cmake -E make_directory build

      - name: Configure CMake
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: |
          cmake .. -A ${{ matrix.platform }} \
            -DCMAKE_INSTALL_PREFIX=bin \
            -DCMAKE_BUILD_TYPE=Release \
            -DJOF_VERSION_STRING="${{ needs.beta-version.outputs.base_version }}" \
            -DJOF_VERSION_SUFFIX="${{ needs.beta-version.outputs.version_suffix }}" \
            -DGIT_SHA=${{ github.sha }} \
            -DGIT_BRANCH=${{ github.ref_name }} \
            -DEXTERNAL_RD_VULKAN_DLL="$RD_VULKAN_DLL"

      - name: Build
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: cmake --build . --config Release -j $NUMBER_OF_PROCESSORS

      - name: Install
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: cmake --install . --config Release

      - name: Download JoF base assets
        shell: bash
        run: |
          mkdir -p build/bin/GameData/base
          curl -L -o build/bin/GameData/base/JoF_Animations.pk3 \
            https://jofhub.eu/apps/cloud/repository/assets/JoF_Animations.pk3
          curl -L -o build/bin/GameData/base/JoF_AssetsExtra.pk3 \
            https://jofhub.eu/apps/cloud/repository/assets/JoF_AssetsExtra.pk3

      - name: Upload Beta Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JoF-beta-windows-${{ matrix.arch }}
          path: build/bin
          if-no-files-found: error

  linux:
    if: github.ref == 'refs/heads/beta' && github.event_name == 'push'
    name: Linux ${{ matrix.arch }} Release (Beta)
    needs: beta-version
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x86_64]
    steps:
      - name: Checkout beta branch
        uses: actions/checkout@v4
        with:
          ref: beta
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies
        run: |
          if [ "${{ matrix.arch }}" = "x86" ]; then
            sudo dpkg --add-architecture i386
            sudo apt-get -qq update
            sudo apt-get -y install gcc-multilib g++-multilib libjpeg-dev:i386 libpng-dev:i386 zlib1g-dev:i386 libsdl2-dev:i386
          else
            sudo apt-get -qq update
            sudo apt-get -y install libjpeg-dev libpng-dev zlib1g-dev libsdl2-dev
          fi

      - name: Create build directory
        run: cmake -E make_directory build

      - name: Configure CMake
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: |
          OPTIONS=(
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
            -DUseInternalLibs=OFF
            -DBuildPortableVersion=OFF
            "-DJOF_VERSION_STRING=${{ needs.beta-version.outputs.base_version }}"
            "-DJOF_VERSION_SUFFIX=${{ needs.beta-version.outputs.version_suffix }}"
            -DGIT_SHA=${{ github.sha }}
            -DGIT_BRANCH=${{ github.ref_name }}
          )
          if [ "${{ matrix.arch }}" = "x86" ]; then
            OPTIONS+=(-DCMAKE_TOOLCHAIN_FILE=cmake/Toolchains/linux-i686.cmake)
          fi
          cmake $GITHUB_WORKSPACE "${OPTIONS[@]}"

      - name: Build
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: cmake --build . -j $(nproc)

      - name: Install
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: cmake --install .

      - name: Download JoF base assets
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/install/JediAcademy/base
          curl -L -o ${{ github.workspace }}/install/JediAcademy/base/JoF_Animations.pk3 \
            https://jofhub.eu/apps/cloud/repository/assets/JoF_Animations.pk3
          curl -L -o ${{ github.workspace }}/install/JediAcademy/base/JoF_AssetsExtra.pk3 \
            https://jofhub.eu/apps/cloud/repository/assets/JoF_AssetsExtra.pk3

      - name: Create binary archive
        working-directory: ${{ github.workspace }}/install/JediAcademy
        shell: bash
        run: tar -czvf ${{ github.workspace }}/JoF-beta-linux-${{ matrix.arch }}.tar.gz *

      - name: Upload Beta Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JoF-beta-linux-${{ matrix.arch }}
          path: ${{ github.workspace }}/JoF-beta-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  macos:
    if: github.ref == 'refs/heads/beta' && github.event_name == 'push'
    name: macOS ${{ matrix.arch }} Release (Beta)
    needs: beta-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
            cmake_extra: ""
          - arch: arm64
            runner: macos-15
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_SYSTEM_PROCESSOR=arm64"
    steps:
      - name: Checkout beta branch
        uses: actions/checkout@v4
        with:
          ref: beta
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies
        run: |
          brew install sdl2
          cmake -E make_directory build

      - name: Configure CMake
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: |
          cmake $GITHUB_WORKSPACE ${{ matrix.cmake_extra }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install \
            -DUseInternalLibs=OFF \
            -DBuildPortableVersion=OFF \
            -DJOF_VERSION_STRING="${{ needs.beta-version.outputs.base_version }}" \
            -DJOF_VERSION_SUFFIX="${{ needs.beta-version.outputs.version_suffix }}" \
            -DGIT_SHA=${{ github.sha }} \
            -DGIT_BRANCH=${{ github.ref_name }}

      - name: Build
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: cmake --build . -j $(sysctl -n hw.ncpu)

      - name: Install
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: cmake --install .

      - name: Download JoF base assets
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/install/JediAcademy/base
          curl -L -o ${{ github.workspace }}/install/JediAcademy/base/JoF_Animations.pk3 \
            https://jofhub.eu/apps/cloud/repository/assets/JoF_Animations.pk3
          curl -L -o ${{ github.workspace }}/install/JediAcademy/base/JoF_AssetsExtra.pk3 \
            https://jofhub.eu/apps/cloud/repository/assets/JoF_AssetsExtra.pk3

      - name: Create binary archive
        working-directory: ${{ github.workspace }}/install/JediAcademy
        shell: bash
        run: |
          chmod +x eternaljk.${{ matrix.arch }}.app/Contents/MacOS/eternaljk.${{ matrix.arch }}
          tar -czvf ${{ github.workspace }}/JoF-beta-macos-${{ matrix.arch }}.tar.gz *

      - name: Upload Beta Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JoF-beta-macos-${{ matrix.arch }}
          path: ${{ github.workspace }}/JoF-beta-macos-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  publish-beta:
    if: github.ref == 'refs/heads/beta' && github.event_name == 'push'
    name: Publish Beta Release
    needs: [beta-version, windows, linux, macos]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout beta branch
        uses: actions/checkout@v4
        with:
          ref: beta
          fetch-depth: 0
          fetch-tags: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4

      - name: Set version env vars
        run: |
          echo "TAG_VERSION=${{ needs.beta-version.outputs.tag_version }}" >> $GITHUB_ENV
          echo "DISPLAY_VERSION=${{ needs.beta-version.outputs.base_version }}${{ needs.beta-version.outputs.version_suffix }}" >> $GITHUB_ENV

      - name: Create archives
        run: |
          zip -r JoF-windows-x86.zip     JoF-beta-windows-x86
          zip -r JoF-windows-x86_64.zip  JoF-beta-windows-x86_64
          mv JoF-beta-linux-x86/JoF-beta-linux-x86.tar.gz       JoF-linux-x86.tar.gz
          mv JoF-beta-linux-x86_64/JoF-beta-linux-x86_64.tar.gz JoF-linux-x86_64.tar.gz
          mv JoF-beta-macos-x86_64/JoF-beta-macos-x86_64.tar.gz JoF-macos-x86_64.tar.gz
          mv JoF-beta-macos-arm64/JoF-beta-macos-arm64.tar.gz   JoF-macos-arm64.tar.gz

      - name: Setup git authentication for tag push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/JediofFreedom/JoF_EJK.git

      - name: Create version tag
        id: tag
        run: |
          git tag "$TAG_VERSION"
          git push origin "$TAG_VERSION"
          echo "tag=$TAG_VERSION" >> $GITHUB_OUTPUT

      - name: Update latest-beta tag
        run: |
          git tag -f latest-beta
          git push origin latest-beta --force

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ env.DISPLAY_VERSION }}
          prerelease: true
          generate_release_notes: true
          files: |
            JoF-windows-x86.zip
            JoF-windows-x86_64.zip
            JoF-linux-x86.tar.gz
            JoF-linux-x86_64.tar.gz
            JoF-macos-x86_64.tar.gz
            JoF-macos-arm64.tar.gz

      - name: Notify Discord
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
          DISPLAY: ${{ env.DISPLAY_VERSION }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK secret is not set; skipping notification."
            exit 0
          fi
          payload=$(jq -n \
            --arg title "New beta release: ${DISPLAY}" \
            --arg url "https://github.com/${REPO}/releases/tag/${TAG}" \
            --arg desc "A new beta build is available for download." \
            '{username:"JoF Releases", embeds:[{title:$title, url:$url, description:$desc, color:15844367}]}')
          curl -sf -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK"

  # =========================
  # MASTER (nightly/manual, only if changes)
  # =========================
  check-master-changes:
    if: github.ref == 'refs/heads/master' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    name: Check if master has changes since last release tag
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          fetch-tags: true

      - name: Decide whether to build
        id: check
        shell: bash
        run: |
          set -euo pipefail

          # Find the newest non-beta tag that looks like X.Y.Z
          LAST_TAG=$(
            git tag --list \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n 1 || true
          )

          echo "Last release tag: ${LAST_TAG:-<none>}"

          if [ -z "${LAST_TAG:-}" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          LAST_COMMIT=$(git rev-list -n 1 "$LAST_TAG")
          echo "Last tag commit: $LAST_COMMIT"

          # Ignore docs/md/.gitignore changes
          CHANGES=$(git diff --name-only "$LAST_COMMIT" HEAD \
            | grep -vE '(\.md$|^\.gitignore$|^docs/|^\.github/)' || true)

          if [ -z "$CHANGES" ]; then
            echo "No relevant changes; skipping nightly/manual build."
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "Relevant changes detected; running build."
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  master-version:
    if: needs.check-master-changes.outputs.should_run == 'true'
    name: Compute Master Version
    needs: check-master-changes
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          fetch-tags: true

      - name: Compute release version
        id: version
        shell: bash
        run: |
          MAJOR=$(grep JOF_VERSION_MAJOR codemp/versionfile/jofversion.h.in | sed -E 's/.*\"(.+)\".*/\1/')
          MINOR=$(grep JOF_VERSION_MINOR codemp/versionfile/jofversion.h.in | sed -E 's/.*\"(.+)\".*/\1/')

          if [[ -z "$MAJOR" || -z "$MINOR" ]]; then
            echo "Failed to parse version"
            exit 1
          fi

          # Count existing release tags for this MAJOR.MINOR to get next patch
          PATCH=$(git tag --list "${MAJOR}.${MINOR}.*" | grep -v beta | wc -l | tr -d ' ')
          VERSION="${MAJOR}.${MINOR}.${PATCH}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Computed version: $VERSION"

  windows-master:
    if: needs.check-master-changes.outputs.should_run == 'true'
    name: Windows ${{ matrix.arch }} Release (Master)
    needs: [check-master-changes, master-version]
    runs-on: windows-2022
    strategy:
      matrix:
        include:
          - arch: x86
            platform: Win32
          - arch: x86_64
            platform: x64
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          fetch-tags: true

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Download Sunny's Vulkan DLL
        shell: bash
        run: |
          mkdir -p external
          if [ "${{ matrix.arch }}" = "x86" ]; then
            ZIP_NAME=EternalJK-windows-x86.zip
            DLL_NAME=rd-vulkan_x86.dll
          else
            ZIP_NAME=EternalJK-windows-x86_64.zip
            DLL_NAME=rd-vulkan_x86_64.dll
          fi
          curl -L -o external/$ZIP_NAME \
            https://github.com/JKSunny/EternalJK/releases/download/latest/$ZIP_NAME
          unzip -j external/$ZIP_NAME "$DLL_NAME" -d external
          echo "RD_VULKAN_DLL=${{ github.workspace }}/external/$DLL_NAME" >> $GITHUB_ENV

      - name: Create build directory
        run: cmake -E make_directory build

      - name: Configure CMake
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: |
          cmake .. -A ${{ matrix.platform }} \
            -DCMAKE_INSTALL_PREFIX=bin \
            -DCMAKE_BUILD_TYPE=Release \
            -DJOF_VERSION_STRING="${{ needs.master-version.outputs.version }}" \
            -DGIT_SHA=${{ github.sha }} \
            -DGIT_BRANCH=${{ github.ref_name }} \
            -DEXTERNAL_RD_VULKAN_DLL="$RD_VULKAN_DLL"

      - name: Build
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: cmake --build . --config Release -j $NUMBER_OF_PROCESSORS

      - name: Install
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: cmake --install . --config Release

      - name: Download JoF base assets
        shell: bash
        run: |
          mkdir -p build/bin/GameData/base
          curl -L -o build/bin/GameData/base/JoF_Animations.pk3 \
            https://jofhub.eu/apps/cloud/repository/assets/JoF_Animations.pk3
          curl -L -o build/bin/GameData/base/JoF_AssetsExtra.pk3 \
            https://jofhub.eu/apps/cloud/repository/assets/JoF_AssetsExtra.pk3

      - name: Upload Master Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JoF-master-windows-${{ matrix.arch }}
          path: build/bin
          if-no-files-found: error

  linux-master:
    if: needs.check-master-changes.outputs.should_run == 'true'
    name: Linux ${{ matrix.arch }} Release (Master)
    needs: [check-master-changes, master-version]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x86_64]
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies
        run: |
          if [ "${{ matrix.arch }}" = "x86" ]; then
            sudo dpkg --add-architecture i386
            sudo apt-get -qq update
            sudo apt-get -y install gcc-multilib g++-multilib libjpeg-dev:i386 libpng-dev:i386 zlib1g-dev:i386 libsdl2-dev:i386
          else
            sudo apt-get -qq update
            sudo apt-get -y install libjpeg-dev libpng-dev zlib1g-dev libsdl2-dev
          fi

      - name: Create build directory
        run: cmake -E make_directory build

      - name: Configure CMake
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: |
          OPTIONS=(
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
            -DUseInternalLibs=OFF
            -DBuildPortableVersion=OFF
            "-DJOF_VERSION_STRING=${{ needs.master-version.outputs.version }}"
            -DGIT_SHA=${{ github.sha }}
            -DGIT_BRANCH=${{ github.ref_name }}
          )
          if [ "${{ matrix.arch }}" = "x86" ]; then
            OPTIONS+=(-DCMAKE_TOOLCHAIN_FILE=cmake/Toolchains/linux-i686.cmake)
          fi
          cmake $GITHUB_WORKSPACE "${OPTIONS[@]}"

      - name: Build
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: cmake --build . -j $(nproc)

      - name: Install
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: cmake --install .

      - name: Download JoF base assets
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/install/JediAcademy/base
          curl -L -o ${{ github.workspace }}/install/JediAcademy/base/JoF_Animations.pk3 \
            https://jofhub.eu/apps/cloud/repository/assets/JoF_Animations.pk3
          curl -L -o ${{ github.workspace }}/install/JediAcademy/base/JoF_AssetsExtra.pk3 \
            https://jofhub.eu/apps/cloud/repository/assets/JoF_AssetsExtra.pk3

      - name: Create binary archive
        working-directory: ${{ github.workspace }}/install/JediAcademy
        shell: bash
        run: tar -czvf ${{ github.workspace }}/JoF-master-linux-${{ matrix.arch }}.tar.gz *

      - name: Upload Master Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JoF-master-linux-${{ matrix.arch }}
          path: ${{ github.workspace }}/JoF-master-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  macos-master:
    if: needs.check-master-changes.outputs.should_run == 'true'
    name: macOS ${{ matrix.arch }} Release (Master)
    needs: [check-master-changes, master-version]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
            cmake_extra: ""
          - arch: arm64
            runner: macos-15
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_SYSTEM_PROCESSOR=arm64"
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies
        run: |
          brew install sdl2
          cmake -E make_directory build

      - name: Configure CMake
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: |
          cmake $GITHUB_WORKSPACE ${{ matrix.cmake_extra }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install \
            -DUseInternalLibs=OFF \
            -DBuildPortableVersion=OFF \
            -DJOF_VERSION_STRING="${{ needs.master-version.outputs.version }}" \
            -DGIT_SHA=${{ github.sha }} \
            -DGIT_BRANCH=${{ github.ref_name }}

      - name: Build
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: cmake --build . -j $(sysctl -n hw.ncpu)

      - name: Install
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: cmake --install .

      - name: Download JoF base assets
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/install/JediAcademy/base
          curl -L -o ${{ github.workspace }}/install/JediAcademy/base/JoF_Animations.pk3 \
            https://jofhub.eu/apps/cloud/repository/assets/JoF_Animations.pk3
          curl -L -o ${{ github.workspace }}/install/JediAcademy/base/JoF_AssetsExtra.pk3 \
            https://jofhub.eu/apps/cloud/repository/assets/JoF_AssetsExtra.pk3

      - name: Create binary archive
        working-directory: ${{ github.workspace }}/install/JediAcademy
        shell: bash
        run: |
          chmod +x eternaljk.${{ matrix.arch }}.app/Contents/MacOS/eternaljk.${{ matrix.arch }}
          tar -czvf ${{ github.workspace }}/JoF-master-macos-${{ matrix.arch }}.tar.gz *

      - name: Upload Master Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JoF-master-macos-${{ matrix.arch }}
          path: ${{ github.workspace }}/JoF-master-macos-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  publish-master:
    if: needs.check-master-changes.outputs.should_run == 'true'
    name: Publish Master Release
    needs: [check-master-changes, master-version, windows-master, linux-master, macos-master]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          fetch-tags: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4

      - name: Set version env var
        run: |
          echo "VERSION=${{ needs.master-version.outputs.version }}" >> $GITHUB_ENV

      - name: Create archives
        run: |
          zip -r JoF-windows-x86.zip     JoF-master-windows-x86
          zip -r JoF-windows-x86_64.zip  JoF-master-windows-x86_64
          mv JoF-master-linux-x86/JoF-master-linux-x86.tar.gz       JoF-linux-x86.tar.gz
          mv JoF-master-linux-x86_64/JoF-master-linux-x86_64.tar.gz JoF-linux-x86_64.tar.gz
          mv JoF-master-macos-x86_64/JoF-master-macos-x86_64.tar.gz JoF-macos-x86_64.tar.gz
          mv JoF-master-macos-arm64/JoF-master-macos-arm64.tar.gz   JoF-macos-arm64.tar.gz

      - name: Setup git authentication for tag push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/JediofFreedom/JoF_EJK.git

      - name: Create version tag
        id: tag
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          prerelease: false
          generate_release_notes: true
          files: |
            JoF-windows-x86.zip
            JoF-windows-x86_64.zip
            JoF-linux-x86.tar.gz
            JoF-linux-x86_64.tar.gz
            JoF-macos-x86_64.tar.gz
            JoF-macos-arm64.tar.gz

      - name: Notify Discord
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK secret is not set; skipping notification."
            exit 0
          fi
          payload=$(jq -n \
            --arg title "New release: ${TAG}" \
            --arg url "https://github.com/${REPO}/releases/tag/${TAG}" \
            --arg desc "A new stable build is available for download." \
            '{username:"JoF Releases", embeds:[{title:$title, url:$url, description:$desc, color:5763719}]}')
          curl -sf -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK"
